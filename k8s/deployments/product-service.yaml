apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: bestbuy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: bryanedler8/product-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        env:
        - name: APP_HOST
          value: "0.0.0.0"
        - name: APP_PORT
          value: "3002"
        - name: LOG_LEVEL
          value: "info"
        - name: WASM_RULES_ENGINE_ENABLED
          value: "false"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: bestbuy
spec:
  selector:
    app: product-service
  ports:
  - port: 3002
    targetPort: 3002
  type: ClusterIP
