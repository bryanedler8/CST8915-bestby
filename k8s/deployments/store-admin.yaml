apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-admin
  namespace: bestbuy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store-admin
  template:
    metadata:
      labels:
        app: store-admin
    spec:
      containers:
      - name: store-admin
        image: bryanedler8/store-admin:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: store-admin
  namespace: bestbuy
spec:
  selector:
    app: store-admin
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
