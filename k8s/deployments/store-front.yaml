apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front
  namespace: bestbuy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      containers:
      - name: store-front
        image: bryanedler8/store-front:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config
        configMap:
          name: store-front-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: store-front
  namespace: bestbuy
spec:
  type: NodePort
  selector:
    app: store-front
  ports:
  - port: 80
    targetPort: 80
    nodePort: 32622
